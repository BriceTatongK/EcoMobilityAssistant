name: Continuous Integration
on:
  workflow_dispatch:
  push:
    # Trigger on any branch push
    branches:
      - "main"
      - "develop"
      - "feature/**" # Matches feature/login, feature/api/v1, etc.
      - "hotfix/*" # Matches hotfix/bug123
  pull_request:
    branches: [main] # Also run when a PR is opened against main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          # This automatically caches NuGet packages for you
          cache: true

      - name: Restore dependencies
        run: dotnet restore src/Tests

      - name: Build
        run: dotnet build src/Tests --no-restore --configuration Release

      - name: Test
        run: dotnet test src/Tests --no-build --configuration Release --verbosity normal
